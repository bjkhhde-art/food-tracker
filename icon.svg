<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Food Tracker Icon</title>
  <desc id="desc">A simple app icon with a bowl of healthy food, a small analytics chart, and a green check mark.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F4EE"/>
      <stop offset="100%" stop-color="#EFE7DB"/>
    </linearGradient>

    <linearGradient id="bowl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E9E1D7"/>
    </linearGradient>

    <linearGradient id="greenBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A6D83E"/>
      <stop offset="100%" stop-color="#74B72E"/>
    </linearGradient>

    <linearGradient id="salmon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB25A"/>
      <stop offset="100%" stop-color="#F28A2E"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#B9AE9E" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="472" height="472" rx="88" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="88" fill="none" stroke="#F2ECE4" stroke-width="8"/>

  <!-- small analytics bars -->
  <g opacity="0.95">
    <rect x="347" y="118" width="22" height="54" rx="11" fill="#C8DF78"/>
    <rect x="376" y="97" width="22" height="75" rx="11" fill="#F0C932"/>
    <rect x="405" y="73" width="22" height="99" rx="11" fill="#84C95E"/>
  </g>

  <!-- bowl group -->
  <g filter="url(#shadow)">
    <!-- greens behind -->
    <ellipse cx="164" cy="195" rx="32" ry="56" fill="#99C93C" transform="rotate(-28 164 195)"/>
    <ellipse cx="196" cy="172" rx="40" ry="66" fill="#6FBC3D" transform="rotate(-24 196 172)"/>
    <ellipse cx="273" cy="178" rx="48" ry="52" fill="#5CB54D"/>
    <ellipse cx="320" cy="184" rx="46" ry="48" fill="#7CC84D"/>
    <ellipse cx="343" cy="207" rx="34" ry="42" fill="#62B43E"/>
    <ellipse cx="133" cy="238" rx="30" ry="17" fill="#6BBE45"/>

    <!-- food elements -->
    <ellipse cx="198" cy="253" rx="56" ry="43" fill="#F3F09A" transform="rotate(18 198 253)"/>
    <ellipse cx="212" cy="259" rx="17" ry="15" fill="#9CC34A"/>
    <circle cx="156" cy="293" r="27" fill="#F6503E"/>
    <path d="M146 268c8 3 15 3 21-2 1 8-2 16-11 17-8 1-12-6-10-15Z" fill="#4DAE45"/>
    <circle cx="181" cy="284" r="4" fill="#FFD0C7" opacity="0.85"/>

    <ellipse cx="258" cy="281" rx="39" ry="30" fill="#F7F5F0" transform="rotate(20 258 281)"/>
    <ellipse cx="258" cy="281" rx="15" ry="12" fill="#FFC800" transform="rotate(20 258 281)"/>

    <path d="M307 240c20-10 66-3 89 22 17 19 16 43-3 58-31 25-111 15-111 15s5-50 25-95Z" fill="url(#salmon)"/>
    <path d="M323 250c20 7 43 18 59 31" stroke="#FFD29B" stroke-width="3.5" stroke-linecap="round" opacity="0.8" fill="none"/>
    <path d="M313 274c24 8 48 22 66 36" stroke="#FFD29B" stroke-width="3.5" stroke-linecap="round" opacity="0.8" fill="none"/>
    <path d="M305 300c24 8 43 19 57 30" stroke="#FFD29B" stroke-width="3.5" stroke-linecap="round" opacity="0.8" fill="none"/>

    <!-- bowl -->
    <ellipse cx="259" cy="300" rx="152" ry="45" fill="#EFE7DC"/>
    <path d="M111 301c12 90 70 132 148 132 79 0 138-42 150-132-44 18-94 27-150 27s-106-9-148-27Z" fill="url(#bowl)"/>
    <path d="M111 301c12 90 70 132 148 132 79 0 138-42 150-132" fill="none" stroke="#E8DFD4" stroke-width="3"/>
    <ellipse cx="259" cy="429" rx="46" ry="11" fill="#E2D8CC"/>
  </g>

  <!-- check badge -->
  <g filter="url(#shadow)">
    <circle cx="393" cy="376" r="51" fill="url(#greenBtn)"/>
    <circle cx="393" cy="376" r="48" fill="none" stroke="#8DC63F" stroke-width="2"/>
    <path d="M367 376l18 18 35-35" fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
